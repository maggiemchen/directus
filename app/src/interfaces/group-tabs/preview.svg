<svg width="156" height="96" viewBox="0 0 156 96" fill="none"
	xmlns="http://www.w3.org/2000/svg">
	<!-- Tab headers -->
	<rect x="18" y="15" width="30" height="20" rx="3" fill="var(--theme--primary)"/>
	<rect x="52" y="15" width="30" height="20" rx="3" fill="var(--theme--background-subdued)"/>
	<rect x="86" y="15" width="30" height="20" rx="3" fill="var(--theme--background-subdued)"/>
	
	<!-- Tab content area -->
	<rect x="18" y="35" width="120" height="45" rx="3" fill="var(--theme--background-page)" stroke="var(--theme--border-color)" stroke-width="1"/>
	
	<!-- Content lines for active tab -->
	<rect x="25" y="45" width="40" height="4" rx="2" fill="var(--theme--primary)" opacity="0.8"/>
	<rect x="25" y="53" width="60" height="4" rx="2" fill="var(--theme--primary)" opacity="0.6"/>
	<rect x="25" y="61" width="35" height="4" rx="2" fill="var(--theme--primary)" opacity="0.6"/>
	<rect x="25" y="69" width="50" height="4" rx="2" fill="var(--theme--primary)" opacity="0.4"/>
	
	<!-- Tab labels -->
	<text x="33" y="27" font-family="Inter" font-size="8" fill="var(--theme--background-page)">Tab 1</text>
	<text x="67" y="27" font-family="Inter" font-size="8" fill="var(--theme--foreground-subdued)">Tab 2</text>
	<text x="101" y="27" font-family="Inter" font-size="8" fill="var(--theme--foreground-subdued)">Tab 3</text>
</svg>